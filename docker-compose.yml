services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskagent
      POSTGRES_PASSWORD: taskagent
      POSTGRES_DB: taskagent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskagent -d taskagent"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      GROQ_API_KEY: ${GROQ_API_KEY:-changeme}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      DATABASE_URL: postgresql://taskagent:taskagent@postgres:5432/taskagent
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: production
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: 3000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
